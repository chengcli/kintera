equilibrium:
  standard-pressure: 1.0e5
  max-iter: 100
  ftol: 5.0e-3
  mole-floor: 1.0e-30

phases:
  - name: silicate
    thermo: ideal-solution
    species:
      - "MgO[silicate]"
      - "SiO2[silicate]"
      - "MgSiO3[silicate]"
      - "FeO[silicate]"
      - "FeSiO3[silicate]"
      - "Na2O[silicate]"
      - "Na2SiO3[silicate]"
      - "H2[silicate]"
      - "H2O[silicate]"
      - "CO[silicate]"
      - "CO2[silicate]"
  - name: metal
    thermo: ideal-solution
    species: ["Fe[metal]", "Si[metal]", "O[metal]", "H[metal]"]
  - name: atmosphere
    thermo: ideal-gas
    species:
      - "H2[gas]"
      - "CO[gas]"
      - "CO2[gas]"
      - "CH4[gas]"
      - "O2[gas]"
      - "H2O[gas]"
      - "Fe[gas]"
      - "Mg[gas]"
      - "SiO[gas]"
      - "Na[gas]"

species:
  - {name: "MgO[silicate]", composition: {Mg: 1, O: 1}}
  - {name: "SiO2[silicate]", composition: {Si: 1, O: 2}}
  - {name: "MgSiO3[silicate]", composition: {Mg: 1, Si: 1, O: 3}}
  - {name: "FeO[silicate]", composition: {Fe: 1, O: 1}}
  - {name: "FeSiO3[silicate]", composition: {Fe: 1, Si: 1, O: 3}}
  - {name: "Na2O[silicate]", composition: {Na: 2, O: 1}}
  - {name: "Na2SiO3[silicate]", composition: {Na: 2, Si: 1, O: 3}}
  - {name: "H2[silicate]", composition: {H: 2}}
  - {name: "H2O[silicate]", composition: {H: 2, O: 1}}
  - {name: "CO[silicate]", composition: {C: 1, O: 1}}
  - {name: "CO2[silicate]", composition: {C: 1, O: 2}}
  - {name: "Fe[metal]", composition: {Fe: 1}}
  - {name: "Si[metal]", composition: {Si: 1}}
  - {name: "O[metal]", composition: {O: 1}}
  - {name: "H[metal]", composition: {H: 1}}
  - {name: "H2[gas]", composition: {H: 2}}
  - {name: "CO[gas]", composition: {C: 1, O: 1}}
  - {name: "CO2[gas]", composition: {C: 1, O: 2}}
  - {name: "CH4[gas]", composition: {C: 1, H: 4}}
  - {name: "O2[gas]", composition: {O: 2}}
  - {name: "H2O[gas]", composition: {H: 2, O: 1}}
  - {name: "Fe[gas]", composition: {Fe: 1}}
  - {name: "Mg[gas]", composition: {Mg: 1}}
  - {name: "SiO[gas]", composition: {Si: 1, O: 1}}
  - {name: "Na[gas]", composition: {Na: 1}}

reactions:
  - type: equilibrium
    equation: "Na2SiO3[silicate] <=> Na2O[silicate] + SiO2[silicate]"
  - type: equilibrium
    equation: "0.5 SiO2[silicate] + Fe[metal] <=> FeO[silicate] + 0.5 Si[metal]"
  - type: equilibrium
    equation: "MgSiO3[silicate] <=> MgO[silicate] + SiO2[silicate]"
  - type: equilibrium
    equation: "O[metal] + 0.5 Si[metal] <=> 0.5 SiO2[silicate]"
  - type: equilibrium
    equation: "2 H[metal] <=> H2[silicate]"
  - type: equilibrium
    equation: "FeSiO3[silicate] <=> FeO[silicate] + SiO2[silicate]"
  - type: equilibrium
    equation: "2 H2O[silicate] + Si[metal] <=> SiO2[silicate] + 2 H2[silicate]"
  - type: equilibrium
    equation: "CO[gas] + 0.5 O2[gas] <=> CO2[gas]"
  - type: equilibrium
    equation: "CH4[gas] + 0.5 O2[gas] <=> 2 H2[gas] + CO[gas]"
  - type: equilibrium
    equation: "H2[gas] + 0.5 O2[gas] <=> H2O[gas]"
  - type: equilibrium
    equation: "FeO[silicate] <=> Fe[gas] + 0.5 O2[gas]"
  - type: equilibrium
    equation: "MgO[silicate] <=> Mg[gas] + 0.5 O2[gas]"
  - type: equilibrium
    equation: "SiO2[silicate] <=> SiO[gas] + 0.5 O2[gas]"
  - type: equilibrium
    equation: "Na2O[silicate] <=> 2 Na[gas] + 0.5 O2[gas]"
  - type: equilibrium
    equation: "H2[gas] <=> H2[silicate]"
  - type: equilibrium
    equation: "H2O[gas] <=> H2O[silicate]"
  - type: equilibrium
    equation: "CO[gas] <=> CO[silicate]"
  - type: equilibrium
    equation: "CO2[gas] <=> CO2[silicate]"
