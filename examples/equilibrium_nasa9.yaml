phases:
  - name: gas
    thermo: ideal-gas
    species: [H2, O2, H2O]

species:
  - name: H2
    composition: {H: 2}

  - name: O2
    composition: {O: 2}

  - name: H2O
    composition: {H: 2, O: 1}

reactions:
  - equation: "H2 + 0.5 O2 <=> H2O"
    type: equilibrium

equilibrium:
  standard-pressure: 1.0e5
  max-iter: 100
  ftol: 1.0e-8
  mole-floor: 1.0e-30
